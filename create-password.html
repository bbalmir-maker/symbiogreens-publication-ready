<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Password | SymbioGreens</title>
  <meta name="description" content="Create your SymbioGreens portal password after application approval.">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="claim-page">
  <main class="claim-shell">
    <section class="form-panel claim-card" aria-labelledby="claimTitle">
      <p class="eyebrow">Approved Portal Access</p>
      <h1 id="claimTitle">Create your SymbioGreens password</h1>
      <p>Use the email address from your approval message. Your account will be linked to the approved portal profile after the password is created.</p>
      <form data-claim-form>
        <label>Email Address<input name="email" type="email" autocomplete="email" required></label>
        <label>Invitation Token<input name="token" type="text" autocomplete="off" required></label>
        <label>New Password<input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
        <label>Confirm Password<input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required></label>
        <button class="primary-btn" type="submit">Create Password</button>
        <p class="career-success-message" role="status" hidden data-claim-success></p>
        <p class="career-error-message" role="alert" hidden data-claim-error></p>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/js/supabase-config.js"></script>
  <script src="shared/js/supabase-client.js"></script>
  <script src="shared/js/auth-guard.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const form = document.querySelector('[data-claim-form]');
    form.elements.email.value = params.get('email') || '';
    form.elements.token.value = params.get('token') || '';

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const success = document.querySelector('[data-claim-success]');
      const errorBox = document.querySelector('[data-claim-error]');
      const button = form.querySelector('button[type="submit"]');
      success.hidden = true;
      errorBox.hidden = true;
      const email = form.elements.email.value.trim().toLowerCase();
      const token = form.elements.token.value.trim();
      const password = form.elements.password.value;
      const confirmPassword = form.elements.confirm_password.value;

      try {
        if (!window.SymbioBackend?.isConfigured?.()) throw new Error('Portal backend is not configured.');
        if (password !== confirmPassword) throw new Error('Passwords do not match.');
        const client = window.SymbioBackend.getClient();
        button.disabled = true;
        button.textContent = 'Creating...';

        let user = null;
        const sessionResult = await client.auth.getSession();
        const sessionUser = sessionResult.data?.session?.user || null;
        if (sessionUser && sessionUser.email?.toLowerCase() === email) {
          const update = await client.auth.updateUser({ password });
          if (update.error) throw update.error;
          user = update.data?.user || sessionUser;
        } else {
          const signup = await client.auth.signUp({ email, password });
          if (signup.error) throw signup.error;
          user = signup.data?.user;
        }
        if (!user?.id) throw new Error('Account was created, but the user id was not returned. Please check your email and try signing in.');

        const claim = await window.SymbioBackend.invoke('claim-approved-profile', { token, email, authUserId: user.id });
        if (claim.error) throw claim.error;
        if (claim.data?.error) throw new Error(claim.data.error);
        success.textContent = 'Password created. Redirecting to your approved portal...';
        success.hidden = false;
        const role = claim.data?.profile?.role;
        const localPortal = role === 'partner' ? 'partner-portal/index.html' : role === 'investor' ? 'investor-portal/index.html' : 'customer-portal/index.html';
        window.setTimeout(() => { window.location.href = claim.data?.portalUrl || localPortal; }, 900);
      } catch (error) {
        errorBox.textContent = error.message || 'Password setup failed.';
        errorBox.hidden = false;
      } finally {
        button.disabled = false;
        button.textContent = 'Create Password';
      }
    });
  </script>
</body>
</html>
